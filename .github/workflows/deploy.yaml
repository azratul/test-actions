name: Deploy Go App to K3d (RPi4 Self-hosted)

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/demo-go:latest

jobs:
  build-and-deploy:
    runs-on: self-hosted  # 👈 aquí lo importante!

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up QEMU (para multiarch)
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push Docker image (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Deploy en K3d (local en RPi4)
        run: |
          kubectl apply -f manifests/deployment.yaml
          kubectl rollout restart deployment/demo-go
